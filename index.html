
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DuoScript - Warm Story Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Serif+JP:wght@200;300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <style>
      :root {
        --font-sans: 'Inter', sans-serif;
        --font-serif: 'Noto Serif JP', serif;
        --font-display: 'Playfair Display', serif;
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(214, 138, 109, 0.2); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(214, 138, 109, 0.4); }
      
      body {
        background-color: #1c1917; /* Warm Stone 900 */
        background-image: 
          radial-gradient(circle at 50% -20%, rgba(214, 138, 109, 0.15), transparent),
          radial-gradient(circle at 0% 100%, rgba(120, 113, 108, 0.1), transparent),
          url("https://www.transparenttextures.com/patterns/p6.png");
        color: #f5f5f4;
        margin: 0;
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
        height: 100dvh;
      }

      .font-serif { font-family: var(--font-serif); font-weight: 300; }
      .font-serif-bold { font-family: var(--font-serif); font-weight: 700; }
      .font-display { font-family: var(--font-display); }

      /* 原稿用紙（Genko Yoshi）ライクなタイポグラフィ */
      .prose-literary {
        font-family: var(--font-serif);
        line-height: 2.8;
        letter-spacing: 0.12em;
        font-weight: 400;
        font-variant-ligatures: common-ligatures;
        color: #e7e5e4;
        text-underline-offset: 0.4em;
        text-decoration-color: rgba(214, 138, 109, 0.1);
      }

      @media (max-width: 768px) {
        .prose-literary {
          line-height: 2.2;
          letter-spacing: 0.08em;
        }
      }

      .animate-fade-in { animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .glass {
        background: rgba(28, 25, 23, 0.65);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      .glass-bright {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .text-glow-warm {
        text-shadow: 0 0 20px rgba(214, 138, 109, 0.4);
      }

      ::selection {
        background: rgba(214, 138, 109, 0.3);
        color: #fff;
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* モバイルでのタップターゲット拡張 */
      @media (max-width: 768px) {
        button, a {
          min-height: 44px;
          min-width: 44px;
        }
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.3",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react-dom": "https://esm.sh/react-dom@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
        "recharts": "https://esm.sh/recharts@^3.6.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
