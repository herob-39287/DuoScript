    <script src="https://cdn.tailwindcss.com" id="tailwind-cdn"></script>
    <script id="tailwind-config">
      // This config is kept for Dev/CDN mode. 
      // For Local Build, it is replaced by tailwind.config.js and styles.css
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: "#1c1917", 
              foreground: "#e7e5e4", 
              
              primary: {
                DEFAULT: "#ea580c", 
                hover: "#f97316",   
                foreground: "#ffffff"
              },
              secondary: {
                DEFAULT: "#292524", 
                hover: "#44403c",   
                foreground: "#a8a29e" 
              },
              muted: {
                DEFAULT: "rgba(255, 255, 255, 0.05)",
                foreground: "#78716c", 
              },
              destructive: {
                DEFAULT: "#ef4444", 
                foreground: "#ffffff",
                muted: "rgba(244, 63, 94, 0.2)", 
                text: "#fb7185" 
              },
              accent: {
                DEFAULT: "rgba(234, 88, 12, 0.1)", 
                foreground: "#fb923c" 
              },
              indigo: {
                DEFAULT: "#4f46e5",
                hover: "#6366f1",
                muted: "rgba(79, 70, 229, 0.2)",
                foreground: "#818cf8"
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['"Noto Serif JP"', 'serif'],
              display: ['"Playfair Display"', 'serif'],
            },
            borderRadius: {
              lg: "0.75rem",
              xl: "1rem",
              "2xl": "1.5rem",
              "3xl": "2rem",
            },
            animation: {
              'fade-in': 'fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards',
              'slide-in-right': 'slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-in-left': 'slideInLeft 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
              fadeIn: {
                'from': { opacity: '0', transform: 'translateY(8px)' },
                'to': { opacity: '1', transform: 'translateY(0)' },
              },
              slideInRight: {
                'from': { transform: 'translateX(100%)' },
                'to': { transform: 'translateX(0)' },
              },
              slideInLeft: {
                'from': { transform: 'translateX(-100%)' },
                'to': { transform: 'translateX(0)' },
              }
            }
          }
        }
      }
    </script>
